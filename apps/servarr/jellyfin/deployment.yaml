apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: servarr
  labels:
    app.kubernetes.io/name: jellyfin
    app.kubernetes.io/part-of: servarr-stack
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: jellyfin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jellyfin
        app.kubernetes.io/part-of: servarr-stack
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/skip-inbound-ports: "7359"
    spec:
      serviceAccountName: jellyfin
      securityContext:
        fsGroup: 1000
        # Host render/video GIDs so abc (PUID 1000) can open /dev/dri/renderD128.
        # Docker --device=/dev/dri is not enough in k8s; match the node:
        #   stat -c '%g' /dev/dri/renderD128 && getent group video
        supplementalGroups:
          - 44   # video (fris-bofh)
          - 109  # render (fris-bofh: getent group render)
      containers:
        - name: jellyfin
          image: lscr.io/linuxserver/jellyfin:10.11.9
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8096
              hostPort: 8096
              protocol: TCP
            - name: discovery
              containerPort: 7359
              hostPort: 7359
              protocol: UDP
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Europe/Bucharest
            - name: JELLYFIN_PublishedServerUrl
              value: http://jellyfin.lan
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /data/media
              readOnly: true
            - name: transcode
              mountPath: /transcode
            - name: dri
              mountPath: /dev/dri
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "3"
              memory: 4Gi
      volumes:
        - name: config
          hostPath:
            path: /mnt/servarr/jellyfin/config
            type: DirectoryOrCreate
        - name: media
          hostPath:
            path: /mnt/servarr/media
            type: Directory
        - name: transcode
          hostPath:
            path: /mnt/servarr/jellyfin/transcode
            type: DirectoryOrCreate
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
