apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: servarr
  labels:
    app.kubernetes.io/name: qbittorrent
    app.kubernetes.io/part-of: servarr-stack
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: qbittorrent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qbittorrent
        app.kubernetes.io/part-of: servarr-stack
      annotations:
        linkerd.io/inject: enabled
    spec:
      serviceAccountName: qbittorrent
      securityContext:
        fsGroup: 1000
      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:5.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9091
              protocol: TCP
            - name: bt-tcp
              containerPort: 6881
              protocol: TCP
            - name: bt-udp
              containerPort: 6881
              protocol: UDP
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Europe/Bucharest
            - name: WEBUI_PORT
              value: "9091"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        # Bulk downloads. Create downloads/torrents/ on the host for qBittorrent "copy .torrent files"
        # (Web UI: /downloads/torrents). Do not point *Arr category roots at that folder.
        - name: downloads
          hostPath:
            path: /mnt/servarr/downloads
            type: Directory
