apiVersion: apps/v1
kind: Deployment
metadata:
  name: bazarr
  namespace: servarr
  labels:
    app.kubernetes.io/name: bazarr
    app.kubernetes.io/part-of: servarr-stack
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: bazarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bazarr
        app.kubernetes.io/part-of: servarr-stack
      annotations:
        linkerd.io/inject: enabled
    spec:
      serviceAccountName: bazarr
      securityContext:
        fsGroup: 1000
      containers:
        - name: bazarr
          image: lscr.io/linuxserver/bazarr:1.4.5
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6767
              protocol: TCP
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Europe/Bucharest
          volumeMounts:
            - name: config
              mountPath: /config
            - name: tv
              mountPath: /tv
            - name: movies
              mountPath: /movies
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: bazarr-config
        - name: tv
          hostPath:
            path: /mnt/servarr/media/tv
            type: Directory
        - name: movies
          hostPath:
            path: /mnt/servarr/media/movies
            type: Directory
