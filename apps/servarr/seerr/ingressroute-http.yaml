# HTTP only — separate IngressRoute required; Traefik does not route web when
# web + websecure + tls are combined in one IngressRoute (HTTP returns 404).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: seerr-http
  namespace: servarr
  labels:
    app.kubernetes.io/name: seerr
    app.kubernetes.io/part-of: servarr-stack
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`seerr.lan`)
      kind: Rule
      middlewares:
        - name: lan-allowlist
          namespace: kube-system
      services:
        - name: seerr
          port: 5055
