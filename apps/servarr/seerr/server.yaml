apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: seerr-http
  namespace: servarr
  labels:
    app.kubernetes.io/name: seerr
    app.kubernetes.io/part-of: servarr-stack
spec:
  # Helm chart name is "seerr-chart"; releaseName is "seerr" → instance label is stable.
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: seerr
  port: http
  proxyProtocol: HTTP/1
